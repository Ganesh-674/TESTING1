<!DOCTYPE html>
<html>
<head>

<title>Zone Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial;}
#map{height:100vh;width:100%;}
#panel{
position:absolute;
top:10px;
left:10px;
width:280px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
z-index:1000;
font-size:14px;
max-height:90vh;
overflow:auto;
}
input,select,button{
width:100%;
margin:5px 0;
padding:7px;
}
</style>

</head>

<body>

<script>
const zoneUser = JSON.parse(localStorage.getItem("zoneUser"));
if(!zoneUser){
  alert("Login required");
  window.location.href="index.html";
}
</script>

<div id="panel">

<h3>👤 <span id="role"></span></h3>

<input id="zoneName" placeholder="Zone Name">

<input id="searchText" placeholder="Search location">
<button onclick="searchLocation()">Search</button>

Lat1 <input id="lat1">
Lng1 <input id="lng1">
Lat2 <input id="lat2">
Lng2 <input id="lng2">

<select id="zoneType">
<option value="School">School</option>
<option value="Hospital">Hospital</option>
</select>

<input id="limit" value="20" placeholder="Speed Limit">

<input type="range" id="size" min="0.0002" max="0.002" step="0.0001" value="0.0005">

<button onclick="manualZone()">Manual Select</button>
<button onclick="addZone()">Add Zone</button>

</div>

<div id="map"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";

import { getDatabase, ref, set }
from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "speed-alert-fd1be.firebaseapp.com",
  databaseURL: "https://speed-alert-fd1be-default-rtdb.firebaseio.com",
  projectId: "speed-alert-fd1be",
  storageBucket: "speed-alert-fd1be.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

document.getElementById("role").innerText = zoneUser.role;

/* MAP */
const map = L.map("map").setView([10.9945,77.0835],15);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
.addTo(map);

let previewZone;

map.on("click",function(e){
  lat1.value = e.latlng.lat;
  lng1.value = e.latlng.lng;
  updateZone();
});

size.oninput = updateZone;

function updateZone(){
  if(!lat1.value) return;

  const s = parseFloat(size.value);

  lat2.value = parseFloat(lat1.value) + s;
  lng2.value = parseFloat(lng1.value) + s;

  if(previewZone) map.removeLayer(previewZone);

  previewZone = L.rectangle(
    [[lat1.value,lng1.value],[lat2.value,lng2.value]],
    {color:"blue",fillOpacity:0.3}
  ).addTo(map);
}

window.manualZone = ()=>{
  alert("Click on map");
}

window.addZone = ()=>{

  const data = {
    name: zoneName.value,
    type: zoneType.value,
    lat1:+lat1.value,
    lng1:+lng1.value,
    lat2:+lat2.value,
    lng2:+lng2.value,
    limit:+limit.value
  };

  set(ref(db,"zones/"+Date.now()),data);

  alert("Zone Added ✅");
}

</script>

<script>
function searchLocation(){
fetch("https://nominatim.openstreetmap.org/search?format=json&q="+searchText.value)
.then(r=>r.json())
.then(d=>{
  if(!d.length) return alert("Not found");

  const lat = parseFloat(d[0].lat);
  const lon = parseFloat(d[0].lon);

  map.setView([lat,lon],17);

  lat1.value = lat;
  lng1.value = lon;

  updateZone();
});
}
</script>

</body>
</html>
