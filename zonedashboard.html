<!DOCTYPE html>
<html>
<head>
<title>Zone Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
#map{height:400px;}
</style>
</head>

<body>

<script>
const zoneUser = JSON.parse(localStorage.getItem("zoneUser"));
if(!zoneUser){
  alert("Login required");
  window.location.href="zone-login.html";
}
</script>

<h3>Logged in as: <span id="role"></span></h3>

Lat1 <input id="lat1" value="10.9945">
Lng1 <input id="lng1" value="77.0835"><br><br>

Lat2 <input id="lat2" value="10.9955">
Lng2 <input id="lng2" value="77.0845"><br><br>

Speed Limit <input id="limit" value="30"><br><br>

<button onclick="addZone()">Add Zone</button>
<button onclick="logout()">Logout</button>

<div id="map"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from
"https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, set } from
"https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

document.getElementById("role").innerText = zoneUser.role;

const firebaseConfig = {
  databaseURL:"https://speed-alert-fd1be-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const map = L.map("map").setView([10.9945,77.0835],15);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
.addTo(map);

window.addZone = ()=>{
  const data = {
    type: zoneUser.role,
    lat1:+lat1.value,
    lng1:+lng1.value,
    lat2:+lat2.value,
    lng2:+lng2.value,
    limit:+limit.value
  };

  set(ref(db,"zones/"+Date.now()),data);
  alert("Zone Added");
};

window.logout = ()=>{
  localStorage.removeItem("zoneUser");
  window.location.href="zonelogin.html";
};
</script>

</body>
</html>
