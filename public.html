<!DOCTYPE html>
<html>
<head>
<title>Public View</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial;}
#topbar{padding:10px;background:#eee;display:flex;gap:15px;align-items:center;}
#led{width:15px;height:15px;border-radius:50%;background:gray;}
#map{height:400px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#2a5298;color:white;}
</style>
</head>

<body>

<div id="topbar">
<span id="speedBox">Speed: 0 km/h</span>
<div id="led"></div>
<span id="msg">Normal Road</span>
</div>

<div id="map"></div>

<h3 style="padding:10px;">🚨 Violation Log</h3>
<table>
<tr>
<th>Speed</th>
<th>Time</th>
<th>Zone</th>
<th>Location</th>
</tr>
<tbody id="log"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig = {
  databaseURL:"https://speed-alert-fd1be-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// MAP
const map = L.map("map").setView([10.9945,77.0835],15);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
const marker = L.marker([0,0]).addTo(map);

// UI
const speedBox = document.getElementById("speedBox");
const led = document.getElementById("led");
const msg = document.getElementById("msg");

// LOCAL ZONE STORAGE (IMPORTANT FIX)
let zonesLocal = [];
let lastLogTime = 0;

// LOAD ZONES FROM FIREBASE
onValue(ref(db,"zones"), snap=>{
  zonesLocal = [];

  snap.forEach(z=>{
    const d = z.val();

    const rect = L.rectangle(
      [[d.lat1,d.lng1],[d.lat2,d.lng2]],
      {color:"red",fillOpacity:0.2}
    ).addTo(map);

    zonesLocal.push({
      bounds: rect.getBounds(),
      type: d.type,
      limit: d.limit
    });
  });
});

// GPS DATA
onValue(ref(db,"GPS"), snap=>{
  const d = snap.val();
  if(!d) return;

  const lat = d.f_latitude;
  const lng = d.f_longitude;

  // ✅ FIXED SPEED
  const speed = (d.f_speed || 0) * 3.6;

  speedBox.innerText = "Speed: " + speed.toFixed(1) + " km/h";

  marker.setLatLng([lat,lng]);
  map.setView([lat,lng],18);

  let inside = false;
  let overspeed = false;

  zonesLocal.forEach(z=>{
    if(z.bounds.contains([lat,lng])){

      inside = true;

      if(speed > z.limit){

        overspeed = true;
        msg.innerText = "🚨 Overspeed in "+z.type+" zone!";

        const now = Date.now();

        // LOG FIX
        if(now - lastLogTime > 3000){
          lastLogTime = now;

          const time = new Date().toLocaleTimeString();

          const row = `
          <tr>
          <td>${speed.toFixed(1)} km/h</td>
          <td>${time}</td>
          <td>${z.type}</td>
          <td>${lat.toFixed(5)}, ${lng.toFixed(5)}</td>
          </tr>
          `;

          document.getElementById("log").innerHTML += row;
        }

      }else{
        msg.innerText = "Inside "+z.type+" zone (Safe)";
      }
    }
  });

  if(!inside){
    msg.innerText = "Normal Road";
  }

  // LED
  if(overspeed){
    led.style.background = "red";
  }else{
    led.style.background = "green";
  }

});

</script>

</body>
</html>
