<!DOCTYPE html>
<html>
<head>

<title>Public View</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial;}
#topbar{
position:fixed;
top:0;
width:100%;
background:black;
color:white;
padding:10px;
text-align:center;
}
#map{height:65vh;margin-top:50px;}
#violationsPanel{
height:35vh;
overflow:auto;
background:#111;
color:white;
padding:10px;
}
</style>

</head>

<body>

<div id="topbar">Waiting GPS...</div>
<div id="map"></div>

<div id="violationsPanel">
<h3>Violations</h3>
<div id="list"></div>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";

import { getDatabase, ref, onValue, push }
from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "speed-alert-fd1be.firebaseapp.com",
  databaseURL: "https://speed-alert-fd1be-default-rtdb.firebaseio.com",
  projectId: "speed-alert-fd1be",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* MAP */
const map = L.map("map").setView([10.9945,77.0835],15);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
.addTo(map);

let zones = [];

onValue(ref(db,"zones"), snap=>{
  zones=[];
  snap.forEach(c=>zones.push(c.val()));
});

let marker = L.marker([0,0]).addTo(map);

let lastViolationTime = 0;

onValue(ref(db,"GPS"), snap=>{

  const d = snap.val();
  if(!d) return;

  const lat = d.f_latitude;
  const lng = d.f_longitude;
  const speed = d.f_speed;

  marker.setLatLng([lat,lng]);
  map.setView([lat,lng],18);

  checkZone(lat,lng,speed);

});

function checkZone(lat,lng,speed){

  let now = Date.now();

  zones.forEach(z=>{

    if(
      lat >= Math.min(z.lat1,z.lat2) &&
      lat <= Math.max(z.lat1,z.lat2) &&
      lng >= Math.min(z.lng1,z.lng2) &&
      lng <= Math.max(z.lng1,z.lng2)
    ){

      if(speed > z.limit){

        document.body.style.background="#300";

        if(now - lastViolationTime > 10000){

          lastViolationTime = now;

          push(ref(db,"violations"),{
            speed:speed,
            zone:z.name || z.type,
            time:new Date().toLocaleTimeString()
          });

        }

      }else{
        document.body.style.background="#030";
      }

    }

  });

}

onValue(ref(db,"violations"), snap=>{

  list.innerHTML="";

  snap.forEach(c=>{
    const v=c.val();
    list.innerHTML += `
      <div>
        Speed:${v.speed} <br>
        Zone:${v.zone} <br>
        Time:${v.time}
      </div><hr>`;
  });

});

</script>

</body>
</html>
