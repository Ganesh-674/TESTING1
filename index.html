<!DOCTYPE html>
<html>
<head>
<title>Zone Authority Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* Background design */
body{
margin:0;
font-family:Arial;

/* gradient + glow effect */
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);

color:white;
text-align:center;
padding-top:100px;
}

/* Speed Echo Title */
.title{
font-size:42px;
font-weight:bold;
margin-bottom:10px;
letter-spacing:2px;
}

.subtitle{
font-size:14px;
margin-bottom:30px;
color:#ccc;
}

/* simple box effect */
.container{
display:inline-block;
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:10px;
backdrop-filter: blur(10px);
}

/* inputs */
input,select{
width:220px;
padding:10px;
margin:8px 0;
border:none;
border-radius:5px;
}

/* button */
button{
padding:10px 20px;
background:#00c6ff;
color:black;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0072ff;
color:white;
}

</style>

</head>

<body>

<div class="title">Speed Echo</div>
<div class="subtitle">Smart Speed Monitoring System</div>

<div class="container">

<h2>School / Hospital Login</h2>

<input id="username" placeholder="Username"><br><br>

<input id="password" type="password" placeholder="Password"><br><br>

<select id="role">
  <option value="school">School</option>
  <option value="hospital">Hospital</option>
</select><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>
function login(){
  const u = username.value;
  const p = password.value;
  const r = role.value;

  // DEMO PASSWORD
  if(p === "zone123"){
    localStorage.setItem("zoneUser",
      JSON.stringify({username:u, role:r})
    );
    window.location.href = "zonedashboard.html";
  }else{
    msg.innerText = "Wrong password";
  }
}
</script>

</body>
</html>
